<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Default: mobile (hp) */
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: lightblue;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        /* Tablet (lebar layr minimal 768px) */
        @media screen and (min-width: 768px) {
        body {
            background-color: lightgreen;
        }
        .container {
            width: 80%;
            margin: auto;
        }
    }

    /* laptop / Desktop (lebar layar minimal 1024px) */
    @media screen and (min-widht: 1024px) {
        body {
            background-color: lightcoral;
        }
        
        .container {
            width: 60%;
            margin: auto;
        }
    }
    </style>
</head>
<body>
    <div class="container">
        <h1>Responsive Design</h1>
        <p>Contoh tampilan menggunakan media query.</p>
    </div>
</body>
</html>
